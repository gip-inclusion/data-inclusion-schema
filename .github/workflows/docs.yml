name: docs

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --group docs
      - run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
      - if: github.event_name == 'pull_request'
        run: uv run mike deploy dev --push --prop-set hidden=true
      - if: github.event_name != 'pull_request'
        run: |
          uv run mike deploy ${{ github.ref_name }} \
            `[[ "${GITHUB_REF_NAME}" =~ ^v1(\.[0-9]+){2}$ ]] && echo "latest --update-aliases"` \
            `[[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] && echo "--prop-set hidden=true"` \
            --push
